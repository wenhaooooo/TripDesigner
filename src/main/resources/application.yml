server:
  port: 8080
  tomcat:
    connection-timeout: 600000
    threads:
      max: 200
      min-spare: 10

spring:
  application:
    name: trip-designer
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  ai:
    openai:
      # 安全：不在代码库中硬编码凭据，必须通过环境变量或 application-local.yml 注入
      base-url: ${AI_BASE_URL:}
      api-key: ${AI_API_KEY:}
      chat:
        options:
          model: ${AI_MODEL:}
          stream: false
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        # 向量维度需与 Embedding 模型输出维度一致（OpenAI text-embedding-3-small=1536, Ollama nomic-embed-text=768）
        dimensions: ${AI_EMBEDDING_DIMENSIONS:1536}
        distance-type: COSINE_DISTANCE
        index-type: HNSW
        initialize-schema: false
        schema-name: public
        table-name: vector_store
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        # 每个消费者预取 1 条消息，避免 LLM 调用并发过高
        prefetch: 1
        # 消费失败时不重新入队（由 Agent 内部重试机制处理）
        default-requeue-rejected: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    defaults:
      enabled: true

jwt:
  # 安全：secret 必须通过环境变量 JWT_SECRET 注入；本地开发请在 application-local.yml 或 .env 中配置
  # 生成方式：openssl rand -base64 48
  secret: ${JWT_SECRET:}
  access-ttl-minutes: 10080
  refresh-ttl-days: 7

app:
  auth:
    permit-paths: /auth/**,/ai/smoke,/ai/tool-smoke,/actuator/health,/actuator/info,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html,/ws/**,/error,/xiaohongshu/**,/rag/**,/shared/**,/knowledge/**

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.tripdesigner
  default-produces-media-type: application/json

# 工作流配置：Agent 执行顺序、熔断阈值、对话历史注入条数
workflow:
  agent-order:
    - planner
    - transport
    - dining
    - sightseeing
    - accommodation
    - budget
    - weather
    - activity
    - reflection
  max-consecutive-failures: 2
  conversation-history-limit: 6
  # 单个 Agent 执行超时时间（秒），0=不超时，生产环境建议 300（5分钟）
  agent-timeout-seconds: 300
  # 失败时跳过的非关键 Agent（交通、餐饮、景点、住宿、预算、天气建议）
  skip-on-failure: transport,dining,sightseeing,accommodation,budget,weather
  # 是否启用并行执行（Transport、Dining、Sightseeing、Accommodation、Budget 并行）
  parallel-execution-enabled: true

# 知识库配置
knowledge:
  embedding:
    provider: spring-ai
    dimensions: 1536
    batch-size: 100
  rag:
    top-k: 5
    similarity-threshold: 0.5
    mmr-lambda: 0.5
    hybrid-alpha: 0.7
    cache-ttl-minutes: 60
  crawler:
    enabled: true
    rate-limit-ms: 1000
    retry-count: 3
    retry-delay-ms: 5000
  scheduler:
    enabled: true
    cron: "0 0 2 * * ?"
    incremental: true